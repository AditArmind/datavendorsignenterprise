<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Base Vendor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0F2247;
  --ink-2:#16305F;
  --gold:#C9973F;
  --gold-soft:#F3E4C8;
  --bg:#F5F4F2;
  --card:#FFFFFF;
  --border:#E6E1DC;
  --text:#241417;
  --muted:#7A6A6C;
  --danger:#23262B;
  --danger-soft:#EDEBE9;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at 8% 0%, rgba(15,34,71,0.09), transparent 42%),
    radial-gradient(circle at 100% 8%, rgba(22,48,95,0.07), transparent 46%),
    radial-gradient(circle at 45% 100%, rgba(15,34,71,0.07), transparent 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
.brand-name{
  font-family:'Bebas Neue',sans-serif;
  letter-spacing:1.2px;
  color:var(--gold);
}

/* ---------- PASSWORD GATE ---------- */
#gate{
  position:fixed;inset:0;
  background:radial-gradient(circle at 20% 20%, #16305F 0%, #0B1730 60%, #050A18 100%);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
  padding:24px;
}
.gate-card{
  background:var(--card);
  border-radius:20px;
  padding:44px 40px 36px;
  width:100%;max-width:380px;
  text-align:center;
  box-shadow:0 30px 60px rgba(0,0,0,.35);
}
.gate-card img{max-width:260px;margin-bottom:22px;}
.gate-card h1{font-size:19px;margin:0 0 6px;color:var(--ink);letter-spacing:.2px;}
.gate-card p{font-size:13.5px;color:var(--muted);margin:0 0 26px;line-height:1.5;}
.gate-card input{
  width:100%;padding:13px 44px 13px 16px;border-radius:10px;border:1.5px solid var(--border);
  font-size:15px;font-family:'Inter',sans-serif;outline:none;
  transition:border-color .15s;
}
.gate-card input:focus{border-color:var(--gold);}
.pw-wrap{position:relative;margin-bottom:12px;}
.pw-wrap input{margin-bottom:0;}
.pw-eye{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;padding:4px;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
}
.pw-eye svg{width:20px;height:20px;}
.pw-eye:hover{color:var(--ink);}
.gate-card button{
  width:100%;padding:13px 16px;border-radius:10px;border:none;
  background:var(--ink);color:#fff;font-size:15px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:background .15s;
}
.gate-card button:hover{background:var(--ink-2);}
#gate-error{color:var(--danger);font-size:13px;height:18px;margin-top:10px;}

/* ---------- APP LAYOUT ---------- */
#app{display:none;min-height:100vh;}
#app.show{display:flex;}

.sidebar{
  width:300px;flex-shrink:0;
  background:var(--ink);
  color:#EDEFF5;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
}
.sidebar-header{
  padding:26px 24px 18px;
  border-bottom:1px solid rgba(255,255,255,.09);
}
.sidebar-header img{max-width:185px;display:block;margin-bottom:14px;filter:brightness(0) invert(1);}
.sidebar-header .brand-sub{font-size:17px;letter-spacing:.8px;}
.sidebar-header .brand-title{font-size:14.5px;font-weight:600;margin-top:4px;color:#fff;}

.search-box{padding:16px 20px 8px;}
.search-box input{
  width:100%;padding:10px 14px;border-radius:9px;border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);color:#fff;font-size:13.5px;outline:none;
  font-family:'Inter',sans-serif;
}
.search-box input::placeholder{color:#8A94B3;}
.search-box input:focus{border-color:var(--gold);background:rgba(255,255,255,.1);}

.nav-scroll{flex:1;overflow-y:auto;padding:8px 12px 20px;}
.nav-group-label{
  font-size:10.5px;font-weight:700;color:#9DA8C4;text-transform:uppercase;
  letter-spacing:.6px;padding:14px 12px 6px;
}
.nav-divider{height:1px;background:rgba(255,255,255,.1);margin:10px 8px 10px;}
.nav-flat-btn{
  width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 12px;border-radius:9px;background:transparent;border:none;
  color:#D7DCEA;font-size:13.3px;font-weight:500;cursor:pointer;text-align:left;
  font-family:'Inter',sans-serif;margin-bottom:2px;
}
.nav-flat-btn:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-flat-btn.active{background:var(--gold);color:#2A1F08;font-weight:700;}
.nav-flat-btn .count{
  font-size:10.5px;font-weight:600;background:rgba(255,255,255,.12);
  padding:2px 8px;border-radius:20px;color:#EDEFF5;flex-shrink:0;
}
.nav-flat-btn.active .count{background:rgba(0,0,0,.18);color:#2A1F08;}
.bl-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#E8B4B4;margin-left:4px;}

/* ---------- MAIN CONTENT ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  padding:20px 40px;border-bottom:1px solid var(--ink);
  background:linear-gradient(120deg, var(--ink) 0%, var(--ink-2) 100%);
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.topbar .crumbs{font-size:12px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.topbar h2{font-size:22px;margin:0;color:#fff;}
.topbar .sub{font-size:13px;color:rgba(255,255,255,.78);margin-top:4px;}
.menu-toggle{
  display:none;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);
  border-radius:8px;padding:9px 12px;font-size:16px;cursor:pointer;
}
.topbar-actions{display:flex;align-items:center;gap:10px;}
.back-home-btn{
  background:var(--gold);color:#2A1F08;border:none;border-radius:8px;
  padding:9px 15px;font-size:12.5px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;
  transition:filter .15s;
}
.back-home-btn:hover{filter:brightness(1.08);}
.back-cat-btn{background:rgba(255,255,255,.18);color:#fff;}
.back-cat-btn:hover{background:rgba(255,255,255,.28);}

.content{padding:32px 40px 60px;flex:1;}
.vendor-grid{
  display:grid;grid-template-columns:repeat(auto-fill, minmax(300px,1fr));gap:16px;
}
.vcard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 22px;transition:box-shadow .15s, transform .15s;
}
.vcard:hover{box-shadow:0 8px 24px rgba(18,32,61,.08);transform:translateY(-2px);}
.vcard.blacklist{border-color:#F0C6C1;background:var(--danger-soft);}
.vcard h3{font-size:16px;margin:0 0 12px;color:var(--ink);font-family:'Space Grotesk',sans-serif;}
.vfield{margin-bottom:9px;font-size:13.3px;line-height:1.5;}
.vfield:last-child{margin-bottom:0;}
.vfield .label{color:var(--muted);font-weight:600;display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.vfield .value{color:var(--text);white-space:pre-line;}
.vfield .value.mono{font-family:'IBM Plex Mono',monospace;font-size:13px;}
.vfield .value a{color:var(--ink-2);font-weight:600;text-decoration:none;}
.vfield .value a:hover{text-decoration:underline;}

.vcard-icons{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.icon-btn{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s, box-shadow .15s;
}
.icon-btn svg{width:18px;height:18px;display:block;}
.icon-btn:hover{transform:translateY(-3px);box-shadow:0 8px 16px rgba(0,0,0,.2);}
.icon-wa{background:#25D366;}
.icon-call{background:#4A5568;}
.icon-maps{background:#EA4335;}
.icon-web{background:var(--ink-2);}
.icon-ig{background:radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);}
.badge{
  display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
  padding:3px 9px;border-radius:20px;background:var(--danger);color:#fff;margin-bottom:10px;
}
.section-desc{font-size:13.5px;color:var(--muted);margin:-14px 0 22px;max-width:640px;}
.empty-state{color:var(--muted);font-size:14px;padding:40px;text-align:center;}

.subhead{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.6px;margin:0 0 16px;}

/* ---------- HOME HERO ---------- */
.home-hero{
  display:flex;align-items:center;gap:26px;
  background:linear-gradient(135deg, var(--ink) 0%, var(--ink-2) 100%);
  border:1px solid var(--ink);border-radius:var(--radius);
  padding:32px 34px;margin-bottom:28px;
  box-shadow:0 14px 30px rgba(15,34,71,.25);
}
.home-hero img{max-width:222px;flex-shrink:0;filter:brightness(0) invert(1);}
.home-hero .hero-text .eyebrow{font-size:34px;font-weight:400;letter-spacing:1px;margin-bottom:6px;}
.home-hero .hero-text h1{font-size:22px;margin:0 0 6px;color:#fff;font-weight:600;}
.home-hero .hero-text p{font-size:13.5px;color:rgba(255,255,255,.78);margin:0;}
.home-cat-grid{
  display:grid;grid-template-columns:repeat(auto-fill, minmax(190px,1fr));gap:16px;margin-bottom:16px;
}
.home-cat-card{
  background:linear-gradient(155deg, var(--ink-2) 0%, var(--ink) 100%);
  color:#fff;border:none;border-radius:var(--radius);
  padding:26px 18px;text-align:center;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  transition:transform .15s, box-shadow .15s, background .15s;
}
.home-cat-card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(15,34,71,.28);background:linear-gradient(155deg, #1E3F7A 0%, var(--ink-2) 100%);}
.home-cat-card .cat-icon{font-size:30px;line-height:1;}
.home-cat-card .cat-name{font-size:14px;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif;}
.home-cta-card{
  grid-column:1 / -1;
  background:var(--gold);color:#2A1F08;border:none;border-radius:var(--radius);
  padding:22px 24px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;
  transition:transform .15s, box-shadow .15s;margin-top:6px;
}
.home-cta-card:hover{transform:translateY(-3px);box-shadow:0 12px 24px rgba(201,151,63,.35);}
.home-cta-card .cat-icon{font-size:22px;}
.home-cta-card .cat-name{font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;}

/* ---------- NAV SPECIAL BUTTONS ---------- */
.nav-special-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:11px 12px;border-radius:9px;background:transparent;border:none;
  color:#F3E4C8;font-size:13.8px;font-weight:700;cursor:pointer;text-align:left;
  font-family:'Inter',sans-serif;margin-bottom:2px;
}
.nav-special-btn:hover{background:rgba(255,255,255,.08);}
.nav-special-btn.active{background:var(--gold);color:#2A1F08;}
.nav-icon{font-size:15px;flex-shrink:0;}
.nav-top-divider{height:1px;background:rgba(255,255,255,.1);margin:6px 8px 10px;}

/* ---------- FORM ---------- */
.vendor-form{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px 30px;max-width:720px;
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.form-row.single{grid-template-columns:1fr;}
.form-field{display:flex;flex-direction:column;}
.form-field label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;}
.form-field label .req{color:var(--gold);}
.form-field input, .form-field textarea{
  padding:11px 13px;border-radius:9px;border:1.5px solid var(--border);
  font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;
  color:var(--text);resize:vertical;
}
.form-field input:focus, .form-field textarea:focus{border-color:var(--gold);}
.form-field .hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
.add-cat2-btn{
  background:none;border:1.5px dashed var(--border);color:var(--ink-2);
  padding:9px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;margin-bottom:18px;transition:border-color .15s, background .15s;
}
.add-cat2-btn:hover{border-color:var(--gold);background:var(--gold-soft);}
#cat2-row.form-row{margin-bottom:18px;}
.form-submit-row{display:flex;align-items:center;gap:14px;margin-top:6px;}
.form-submit-row button{
  padding:12px 24px;border-radius:9px;border:none;background:var(--ink);color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;
}
.form-submit-row button:hover{background:var(--ink-2);}
.form-success{
  display:none;background:#EAF6EC;border:1px solid #B7E0BC;color:#20602B;
  padding:10px 14px;border-radius:9px;font-size:13px;margin-top:14px;
}
.form-success.show{display:block;}
.form-note{
  background:var(--gold-soft);border:1px solid #E4CB94;color:#5C4419;
  padding:12px 16px;border-radius:10px;font-size:12.5px;line-height:1.6;margin-bottom:22px;max-width:720px;
}

footer.site-footer{
  padding:20px 40px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;
}
footer.site-footer .footer-strong{
  margin-top:4px;font-weight:700;color:var(--ink);letter-spacing:.2px;
}

@media (max-width:900px){
  .sidebar{position:fixed;left:-320px;z-index:60;transition:left .2s;box-shadow:0 0 40px rgba(0,0,0,.3);}
  .sidebar.open{left:0;}
  .menu-toggle{display:inline-block;}
  .content{padding:24px 18px 50px;}
  .topbar{padding:16px 18px;}
  .home-hero{flex-direction:column;text-align:center;}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>

</div>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand-title">Data Base Vendor</div>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Cari nama vendor…" oninput="onSearch(this.value)">
    </div>
    <nav class="nav-scroll" id="nav-scroll"></nav>
  </aside>

  <div class="main">
    <div class="topbar" id="topbar">
      <div>
        <div class="crumbs" id="crumbs">Data Base Vendor</div>
        <h2 id="page-title">Home</h2>
        <div class="sub" id="page-sub"></div>
      </div>
      <div class="topbar-actions">
        <button class="back-home-btn back-cat-btn" id="back-cat-btn" style="display:none;">↩ Kembali</button>
        <button class="back-home-btn" id="back-home-btn" onclick="selectHome()">⌂ Back to Home</button>
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ Menu</button>
      </div>
    </div>
    <div class="content" id="content"></div>
    <footer class="site-footer">
      <div>Data Base Vendor · Dokumen internal, mohon tidak disebarluaskan.</div>
      <div class="footer-strong">Internal Assets — Not for Public</div>
    </footer>
  </div>
</div>

function iconBtn(kind, href, label){
  return `<a class="icon-btn icon-${kind}" href="${escapeHTML(href)}" target="_blank" rel="noopener" title="${escapeHTML(label)}">${ICON_SVG[kind]}</a>`;
}

function extractFirstUrl(text){
  if(!text) return null;
  const urlRe = /((https?:\/\/|www\.)[^\s]+)/i;
  const m = text.match(urlRe);
  if(!m) return null;
  let url = m[0];
  let trail = '';
  while(url.length && /[),.;:]$/.test(url)){ trail = url.slice(-1) + trail; url = url.slice(0, -1); }
  const href = url.toLowerCase().startsWith('http') ? url : 'https://' + url;
  const cleaned = (text.slice(0, m.index) + text.slice(m.index + m[0].length)).trim();
  return { href, cleaned };
}

function buildIconRow(telepon, alamat, websiteHref){
  let icons = '';
  if(telepon){
    icons += iconBtn('wa', waLink(telepon), 'Chat via WhatsApp');
    icons += iconBtn('call', telLink(telepon), 'Telepon langsung');
  }
  if(alamat) icons += iconBtn('maps', mapsLink(alamat), 'Buka di Google Maps');
  if(websiteHref){
    const isIG = /instagram\.com/i.test(websiteHref);
    icons += iconBtn(isIG ? 'ig' : 'web', websiteHref, isIG ? 'Buka Instagram' : 'Buka Website');
  }
  return icons ? `<div class="vcard-icons">${icons}</div>` : '';
}

function extractPhoneDigits(rawPhone){
  if(!rawPhone) return '';
  const matches = String(rawPhone).match(/[\d][\d\s\-\.]{6,}\d/g);
  const candidate = matches && matches.length ? matches[0] : rawPhone;
  let digits = candidate.replace(/[^0-9]/g, '');
  if(digits.startsWith('0')) digits = '62' + digits.slice(1);
  else if(!digits.startsWith('62')) digits = '62' + digits;
  return digits;
}

function waLink(rawPhone){
  return 'https://wa.me/' + extractPhoneDigits(rawPhone);
}

function telLink(rawPhone){
  return 'tel:+' + extractPhoneDigits(rawPhone);
}

function mapsLink(address){
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address);
}

function linkifyEscaped(text){
  if(!text) return '';
  const urlRe = /((https?:\/\/|www\.)[^\s]+)/gi;
  let result = '';
  let lastIndex = 0;
  let m;
  while((m = urlRe.exec(text)) !== null){
    result += escapeHTML(text.slice(lastIndex, m.index));
    let url = m[0];
    let trail = '';
    while(url.length && /[),.;:]$/.test(url)){
      trail = url.slice(-1) + trail;
      url = url.slice(0, -1);
    }
    const href = url.toLowerCase().startsWith('http') ? url : 'https://' + url;
    result += `<a href="${escapeHTML(href)}" target="_blank" rel="noopener">${escapeHTML(url)}</a>${escapeHTML(trail)}`;
    lastIndex = urlRe.lastIndex;
  }
  result += escapeHTML(text.slice(lastIndex));
  return result;
}

function fieldHTML(label, value, mode){
  if(!value) return '';
  let inner;
  if(mode === 'phone'){
    inner = `<a href="${escapeHTML(waLink(value))}" target="_blank" rel="noopener">💬 ${escapeHTML(value)}</a>`;
  } else if(mode === 'address'){
    inner = `<a href="${escapeHTML(mapsLink(value))}" target="_blank" rel="noopener">📍 ${escapeHTML(value)}</a>`;
  } else if(mode === 'linkify'){
    inner = linkifyEscaped(value);
  } else {
    inner = escapeHTML(value);
  }
  return `<div class="vfield"><span class="label">${label}</span><span class="value${mode === 'mono' ? ' mono':''}">${inner}</span></div>`;
}

function renderVendorGrid(vendors, isBlacklist){
  const content = document.getElementById('content');
  if(!vendors.length){
    content.innerHTML = '<div class="empty-state">Belum ada data vendor pada bagian ini.</div>';
    return;
  }
  let html = '<div class="vendor-grid">';
  vendors.forEach(v => {
    html += `<div class="vcard${isBlacklist ? ' blacklist' : ''}">`;
    if(isBlacklist) html += `<span class="badge">Blacklist</span>`;
    html += `<h3>${escapeHTML(v.nama)}</h3>`;
    if(isBlacklist){
      html += fieldHTML('Kategori', v.kategori);
      html += fieldHTML('Alasan', v.alasan, 'linkify');
    } else {
      let deskripsi = v.deskripsi;
      let remarks = v.remarks;
      let websiteHref = null;
      let found = extractFirstUrl(deskripsi);
      if(found){ websiteHref = found.href; deskripsi = found.cleaned; }
      else {
        found = extractFirstUrl(remarks);
        if(found){ websiteHref = found.href; remarks = found.cleaned; }
      }
      html += fieldHTML('Contact Person', v.contact_person);
      html += fieldHTML('Layanan', deskripsi, 'linkify');
      html += fieldHTML('Catatan', remarks, 'linkify');
      html += buildIconRow(v.telepon, v.alamat, websiteHref);
    }
    html += '</div>';
  });
  html += '</div>';
  content.innerHTML = html;
}

function renderFlatGrid(section){
  const content = document.getElementById('content');
  const vendors = section.vendors;
  if(!vendors.length){
    content.innerHTML = '<div class="empty-state">Belum ada data vendor pada bagian ini.</div>';
    return;
  }
  let html = '<div class="vendor-grid">';
  vendors.forEach(v => {
    html += `<div class="vcard"><h3>${escapeHTML(v.nama)}</h3>`;
    html += fieldHTML('Contact Person', v.contact_person);
    if(v.produk && v.produk.length){
      html += `<div class="vfield"><span class="label">Produk / Rate</span><span class="value">`;
      html += v.produk.map(p => {
        const parts = [p.label, p.value, p.rate].filter(Boolean);
        return '• ' + parts.join(' — ');
      }).join('\n');
      html += `</span></div>`;
    }
    if(v.items && v.items.length){
      html += `<div class="vfield"><span class="label">Jenis Kegiatan / Rate</span><span class="value">`;
      html += v.items.map(it => {
        const parts = [it.jenis, it.rate, it.remarks].filter(Boolean);
        return '• ' + parts.join(' — ');
      }).join('\n');
      html += `</span></div>`;
    }
    html += buildIconRow(v.telepon, null, null);
    html += '</div>';
  });
  html += '</div>';
  content.innerHTML = html;
}

function onSearch(q){
  q = q.trim().toLowerCase();
  if(!q){
    selectHome();
    return;
  }
  setBackCatVisible(false);
  let results = [];
  SITE_DATA.forEach(section => {
    const isBlacklist = section.id === 'vendor-black-list';
    if(section.type === 'parent'){
      section.subcategories.forEach(sub => {
        sub.vendors.forEach(v => {
          if(v.nama.toLowerCase().includes(q)){
            results.push(Object.assign({}, v, {__section:section.title + ' — ' + sub.name, __isBlacklist:false, __isFlat:false}));
          }
        });
      });
    } else {
      section.vendors.forEach(v => {
        if(v.nama.toLowerCase().includes(q)){
          results.push(Object.assign({}, v, {__section:section.title, __isBlacklist:isBlacklist, __isFlat: section.type === 'flat'}));
        }
      });
    }
  });
  clearActiveNav();
  setBackHomeVisible(true);
  setTopbarVisible(true);
  document.getElementById('crumbs').textContent = 'Hasil pencarian';
  document.getElementById('page-title').textContent = `"${q}"`;
  document.getElementById('page-sub').textContent = `${results.length} vendor ditemukan`;

  const content = document.getElementById('content');
  if(!results.length){
    content.innerHTML = '<div class="empty-state">Tidak ada vendor yang cocok dengan pencarian.</div>';
    return;
  }
  let html = '<div class="vendor-grid">';
  results.forEach(v => {
    html += `<div class="vcard${v.__isBlacklist ? ' blacklist':''}">`;
    if(v.__isBlacklist) html += `<span class="badge">Blacklist</span>`;
    html += `<h3>${escapeHTML(v.nama)}</h3>`;
    html += `<div class="vfield"><span class="label">Bagian</span><span class="value">${escapeHTML(v.__section)}</span></div>`;
    if(v.__isBlacklist){
      html += fieldHTML('Alasan', v.alasan, 'linkify');
    } else {
      html += fieldHTML('Contact Person', v.contact_person);
      html += buildIconRow(v.telepon, v.__isFlat ? null : v.alamat, null);
    }
    html += '</div>';
  });
  html += '</div>';
  content.innerHTML = html;
}

function slugify(s){
  return String(s).toLowerCase().trim()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

function getCategoryIcon(title){
  const t = String(title).toLowerCase();
  const rules = [
    [/black ?list/, '⚠️'],
    [/construction/, '🏗️'],
    [/taman/, '🌳'],
    [/document/, '📷'],
    [/equip?tment/, '🧰'],
    [/local/, '📍'],
    [/merchandise|advertising/, '🎁'],
    [/perijinan|izin/, '📄'],
    [/photobooth/, '📸'],
    [/support/, '🤝'],
    [/streaming/, '📡'],
    [/decoration|dekorasi/, '🎨'],
    [/roaders?|tent|tenda/, '⛺'],
    [/booth production|pitching/, '🏢'],
    [/others? vendor/, '✨'],
    [/catering|kater/, '🍽️'],
    [/sound|audio/, '🔊'],
  ];
  for(const [re, icon] of rules){
    if(re.test(t)) return icon;
  }
  return '🏷️';
}

        <div class="form-field">
          <label>Kategori Kedua</label>
          <input type="text" id="f-kategori2" placeholder="mis. Streaming System">
        </div>
        <div class="form-field">
          <label>Sub Kategori Kedua</label>
          <input type="text" id="f-subkategori2" placeholder="opsional">
        </div>
      </div>

      <div class="form-submit-row">
        <button type="submit" id="form-submit-btn">Simpan Vendor</button>
        <span id="form-error" style="color:var(--danger);font-size:13px;"></span>
      </div>
      <div class="form-success" id="form-success">Vendor baru berhasil ditambahkan ke database.</div>
    </form>
  `;
}

function toggleSecondCategory(){
  const row = document.getElementById('cat2-row');
  const btn = document.getElementById('add-cat2-btn');
  const showing = row.style.display !== 'none';
  row.style.display = showing ? 'none' : 'grid';
  btn.textContent = showing ? '＋ Vendor ini juga masuk kategori lain?' : '－ Batal tambah kategori lain';
}

function loadCustomVendors(){
  let list = [];
  try{
    const raw = localStorage.getItem('sl_custom_vendors');
    if(raw) list = JSON.parse(raw);
  }catch(e){}
  list.forEach(entry => {
    if(entry && entry.nama && String(entry.nama).trim()){
      addVendorToSiteData(entry, false);
    }
  });
}

function saveCustomVendor(entry){
  let list = [];
  try{
    const raw = localStorage.getItem('sl_custom_vendors');
    if(raw) list = JSON.parse(raw);
  }catch(e){}
  list.push(entry);
  try{ localStorage.setItem('sl_custom_vendors', JSON.stringify(list)); }catch(e){}
}

async function loadRemoteVendors(){
  if(!SYNC_ENDPOINT) return;
  try{
    const res = await fetch(SYNC_ENDPOINT, {method:'GET'});
    const data = await res.json();
    if(Array.isArray(data)){
      data.forEach(entry => {
        if(entry && entry.nama && String(entry.nama).trim()){
          addVendorToSiteData(entry, false);
        }
      });
    }
  }catch(e){
    console.warn('Gagal memuat data sinkron dari server:', e);
  }
}

async function pushVendorRemote(vendor){
  if(!SYNC_ENDPOINT) return true;
  try{
    await fetch(SYNC_ENDPOINT, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(vendor)
    });
    return true;
  }catch(e){
    console.warn('Gagal mengirim vendor ke server pusat:', e);
    return false;
  }
}

function addVendorToSiteData(vendor, persist){
  const kategori = (vendor.kategori || '').trim();
  const subkategori = (vendor.subkategori || '').trim();
  const sectionTitle = kategori ? kategori : `Vendor ${vendor.nama}`;
  const sectionId = kategori ? slugify(kategori) : `vendor-${slugify(vendor.nama)}`;
  let section = SITE_DATA.find(s => s.id === sectionId);

  if(section && section.type === 'vendor' && !subkategori){
    section.vendors.push(vendor);
    section.count = section.vendors.length;
  } else if(section && (section.type === 'parent' || (section.type === 'vendor' && subkategori))){
    // convert a plain 'vendor' section into 'parent' if a subkategori is now introduced
    if(section.type === 'vendor'){
      section.type = 'parent';
      section.subcategories = [{ id: section.id + '-umum', name: 'Umum', vendors: section.vendors, count: section.vendors.length }];
      delete section.vendors;
    }
    const subName = subkategori || 'Lainnya';
    let sub = section.subcategories.find(sc => sc.name.toLowerCase() === subName.toLowerCase());
    if(!sub){
      sub = { id: section.id + '-' + slugify(subName), name: subName, vendors: [], count: 0 };
      section.subcategories.push(sub);
      section.subcategories.sort((a,b) => a.name.localeCompare(b.name));
    }
    sub.vendors.push(vendor);
    sub.count = sub.vendors.length;
    section.count = section.subcategories.reduce((sum, sc) => sum + sc.count, 0);
  } else {
    if(subkategori){
      section = { id: sectionId, title: sectionTitle, type: 'parent',
        subcategories: [{ id: sectionId + '-' + slugify(subkategori), name: subkategori, vendors: [vendor], count: 1 }],
        count: 1 };
    } else {
      section = { id: sectionId, title: sectionTitle, type: 'vendor', vendors: [vendor], count: 1 };
    }
    // insert into vendor/parent group: after last existing category-type section
    let insertIdx = 0;
    for(let i = 0; i < SITE_DATA.length; i++){
      if(SITE_DATA[i].type === 'vendor' || SITE_DATA[i].type === 'parent') insertIdx = i + 1;
    }
    SITE_DATA.splice(insertIdx, 0, section);
  }
  if(persist) saveCustomVendor(vendor);
  return section;
}

async function handleFormSubmit(e){
  e.preventDefault();
  const nama = document.getElementById('f-nama').value.trim();
  const errEl = document.getElementById('form-error');
  const btn = document.getElementById('form-submit-btn');
  errEl.textContent = '';
  if(!nama){
    errEl.textContent = 'Nama Vendor wajib diisi.';
    return false;
  }
  const baseFields = {
    nama: nama,
    contact_person: document.getElementById('f-cp').value.trim(),
    telepon: document.getElementById('f-telepon').value.trim(),
    alamat: document.getElementById('f-alamat').value.trim(),
    deskripsi: document.getElementById('f-deskripsi').value.trim(),
    remarks: document.getElementById('f-remarks').value.trim()
  };
  const vendor = Object.assign({}, baseFields, {
    kategori: document.getElementById('f-kategori').value.trim(),
    subkategori: document.getElementById('f-subkategori').value.trim()
  });

  const kategori2 = document.getElementById('f-kategori2').value.trim();
  const subkategori2 = document.getElementById('f-subkategori2').value.trim();
  let vendor2 = null;
  if(kategori2){
    vendor2 = Object.assign({}, baseFields, { kategori: kategori2, subkategori: subkategori2 });
  }

  if(btn){ btn.disabled = true; btn.textContent = 'Menyimpan…'; }
  const section = addVendorToSiteData(vendor, true);
  if(SYNC_ENDPOINT) await pushVendorRemote(vendor);
  if(vendor2){
    addVendorToSiteData(vendor2, true);
    if(SYNC_ENDPOINT) await pushVendorRemote(vendor2);
  }
  renderNav();
  document.getElementById('vendor-form').reset();
  document.getElementById('cat2-row').style.display = 'none';
  document.getElementById('add-cat2-btn').textContent = '＋ Vendor ini juga masuk kategori lain?';
  document.getElementById('form-success').classList.add('show');
  if(btn){ btn.disabled = false; btn.textContent = 'Simpan Vendor'; }
  setTimeout(() => {
    selectSection(section.id);
  }, 900);
  return false;
}

function init(){
  loadCustomVendors();
  renderNav();
  selectHome();
  if(SYNC_ENDPOINT){
    loadRemoteVendors().then(() => {
      renderNav();
      if(currentSectionId === 'home'){
        document.getElementById('content').innerHTML = renderHomeHTML();
      }
    });
  }
}
if(document.getElementById('app').classList.contains('show')){
  init();
}
</script>
